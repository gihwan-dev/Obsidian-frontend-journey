<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="looseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strictGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compromiseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">예전의 린트: 늘 타협이 필요했던 이유</text>

  <!-- Spectrum bar -->
  <rect x="80" y="100" width="640" height="60" rx="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Loose zone -->
  <rect x="80" y="100" width="220" height="60" rx="30" fill="url(#looseGrad)"/>
  <text x="190" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b">느슨한 규칙</text>

  <!-- Strict zone -->
  <rect x="500" y="100" width="220" height="60" rx="30" fill="url(#strictGrad)"/>
  <text x="610" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">엄격한 규칙</text>

  <!-- Compromise marker -->
  <line x1="370" y1="85" x2="370" y2="175" stroke="#d97706" stroke-width="3" stroke-dasharray="6,4"/>
  <rect x="320" y="170" width="100" height="36" rx="18" fill="url(#compromiseGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="370" y="193" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">타협점</text>

  <!-- Left consequences -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="220" height="110" rx="10" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">코드 빠르게 무너짐</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#fecaca" stroke-width="1"/>
    <text x="110" y="70" text-anchor="middle" font-size="12" fill="#6b7280">✓ 개발 속도 빠름</text>
    <text x="110" y="92" text-anchor="middle" font-size="12" fill="#6b7280">✗ 일관성 부재</text>
  </g>

  <!-- Right consequences -->
  <g transform="translate(480, 200)">
    <rect x="0" y="0" width="220" height="110" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="110" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">개발 속도 급락</text>
    <line x1="20" y1="45" x2="200" y2="45" stroke="#bfdbfe" stroke-width="1"/>
    <text x="110" y="70" text-anchor="middle" font-size="12" fill="#6b7280">✓ 코드 일관성 확보</text>
    <text x="110" y="92" text-anchor="middle" font-size="12" fill="#6b7280">✗ 규칙 맞추는 비용 큼</text>
  </g>

  <!-- Bottom quote -->
  <text x="400" y="370" text-anchor="middle" font-size="13" fill="#9ca3af" font-style="italic">"일단 이 정도면 괜찮다"는 선에서 멈추곤 했습니다</text>
</svg>