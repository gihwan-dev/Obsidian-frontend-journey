<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">리뷰 루프를 늘려도 품질은 수렴한다</text>

  <!-- Chart area -->
  <g transform="translate(100, 60)">
    <!-- Grid lines -->
    <line x1="60" y1="20" x2="60" y2="280" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="60" y1="280" x2="620" y2="280" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="60" y1="220" x2="620" y2="220" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="60" y1="160" x2="620" y2="160" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="60" y1="100" x2="620" y2="100" stroke="#f1f5f9" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Plateau line (dashed) -->
    <line x1="60" y1="80" x2="620" y2="80" stroke="#d97706" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="625" y="84" font-size="11" fill="#d97706" font-weight="600">이상적 품질</text>

    <!-- Convergence line -->
    <line x1="60" y1="120" x2="620" y2="120" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="625" y="124" font-size="11" fill="#ef4444" font-weight="600">수렴 지점</text>

    <!-- Area under curve -->
    <path d="M 60 280 Q 120 270, 160 230 Q 200 190, 260 160 Q 320 140, 380 130 Q 440 125, 500 122 Q 560 120, 620 119 L 620 280 Z" fill="url(#areaGrad)"/>

    <!-- Main curve -->
    <path d="M 60 280 Q 120 270, 160 230 Q 200 190, 260 160 Q 320 140, 380 130 Q 440 125, 500 122 Q 560 120, 620 119" fill="none" stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Data points -->
    <circle cx="60" cy="280" r="4" fill="#6366f1"/>
    <circle cx="160" cy="230" r="4" fill="#6366f1"/>
    <circle cx="260" cy="160" r="4" fill="#6366f1"/>
    <circle cx="380" cy="130" r="4" fill="#6366f1"/>
    <circle cx="500" cy="122" r="4" fill="#6366f1"/>
    <circle cx="620" cy="119" r="4" fill="#6366f1"/>

    <!-- Gap annotation -->
    <line x1="540" y1="80" x2="540" y2="120" stroke="#9ca3af" stroke-width="1"/>
    <line x1="535" y1="80" x2="545" y2="80" stroke="#9ca3af" stroke-width="1"/>
    <line x1="535" y1="120" x2="545" y2="120" stroke="#9ca3af" stroke-width="1"/>
    <text x="555" y="104" font-size="10" fill="#9ca3af">갭</text>

    <!-- Phase labels -->
    <rect x="80" y="235" width="110" height="28" rx="14" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="135" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">빠른 개선 구간</text>

    <rect x="340" y="145" width="140" height="28" rx="14" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="410" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">수렴 → 정체 구간</text>

    <!-- Y axis label -->
    <text x="15" y="155" text-anchor="middle" font-size="12" fill="#64748b" transform="rotate(-90, 15, 155)">코드 품질</text>

    <!-- X axis label -->
    <text x="340" y="310" text-anchor="middle" font-size="12" fill="#64748b">리뷰 반복 횟수</text>

    <!-- X axis ticks -->
    <text x="60" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">0</text>
    <text x="160" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">1차</text>
    <text x="260" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">3차</text>
    <text x="380" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">5차</text>
    <text x="500" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">10차</text>
    <text x="620" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">n차</text>
  </g>

  <!-- Bottom insight -->
  <text x="400" y="400" text-anchor="middle" font-size="13" fill="#9ca3af" font-style="italic">채점 기준이 애매하면, AI는 "그럴듯한 코드"로만 수렴한다</text>
</svg>