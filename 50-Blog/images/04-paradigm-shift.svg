<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="newGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ddd6fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">린트의 역할 변화</text>

  <!-- ===== LEFT: Before ===== -->
  <g transform="translate(40, 60)">
    <text x="160" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="#64748b">BEFORE</text>
    <text x="160" y="38" text-anchor="middle" font-size="11" fill="#94a3b8">사람이 코드를 쓰던 시절</text>

    <!-- Main card -->
    <rect x="10" y="50" width="300" height="260" rx="12" fill="url(#oldGrad)" stroke="#cbd5e1" stroke-width="1.5"/>

    <!-- Lint icon/label -->
    <rect x="90" y="70" width="140" height="40" rx="20" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="160" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Lint 규칙</text>

    <!-- Arrow down -->
    <line x1="160" y1="112" x2="160" y2="135" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="153,132 160,142 167,132" fill="#94a3b8"/>

    <!-- Target -->
    <rect x="70" y="145" width="180" height="36" rx="8" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="160" y="169" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">사람을 훈육</text>

    <!-- Arrow down -->
    <line x1="160" y1="183" x2="160" y2="206" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="153,203 160,213 167,203" fill="#94a3b8"/>

    <!-- Result -->
    <rect x="50" y="216" width="220" height="36" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="160" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">규칙 비용 &gt; 이득 → 타협</text>

    <!-- Cost note -->
    <text x="160" y="280" text-anchor="middle" font-size="11" fill="#9ca3af">엄격한 규칙 = 높은 비용</text>
    <text x="160" y="296" text-anchor="middle" font-size="11" fill="#9ca3af">"이 정도면 괜찮다"에서 멈춤</text>
  </g>

  <!-- ===== CENTER: Transition Arrow ===== -->
  <g transform="translate(360, 180)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="white" stroke="#6366f1" stroke-width="2"/>
    <polygon points="60,10 75,20 60,30" fill="#6366f1"/>
    <text x="32" y="25" text-anchor="middle" font-size="18" fill="#6366f1">→</text>
  </g>

  <!-- ===== RIGHT: After ===== -->
  <g transform="translate(450, 60)">
    <text x="160" y="20" text-anchor="middle" font-size="14" font-weight="600" fill="#6366f1">AFTER</text>
    <text x="160" y="38" text-anchor="middle" font-size="11" fill="#a78bfa">AI가 코드를 쓰는 시대</text>

    <!-- Main card -->
    <rect x="10" y="50" width="300" height="260" rx="12" fill="url(#newGrad)" stroke="#a78bfa" stroke-width="1.5"/>

    <!-- Lint icon/label -->
    <rect x="90" y="70" width="140" height="40" rx="20" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <text x="160" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">Lint 규칙</text>

    <!-- Arrow down -->
    <line x1="160" y1="112" x2="160" y2="135" stroke="#6366f1" stroke-width="2"/>
    <polygon points="153,132 160,142 167,132" fill="#6366f1"/>

    <!-- Target -->
    <rect x="55" y="145" width="210" height="36" rx="8" fill="white" stroke="#6366f1" stroke-width="1"/>
    <text x="160" y="169" text-anchor="middle" font-size="13" font-weight="600" fill="#4f46e5">AI 작업 환경 설계</text>

    <!-- Arrow down -->
    <line x1="160" y1="183" x2="160" y2="206" stroke="#6366f1" stroke-width="2"/>
    <polygon points="153,203 160,213 167,203" fill="#6366f1"/>

    <!-- Result -->
    <rect x="40" y="216" width="240" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="160" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">엄격할수록 결과물이 나음</text>

    <!-- Cost note -->
    <text x="160" y="280" text-anchor="middle" font-size="11" fill="#7c3aed">AI가 규칙 맞추는 비용 ≈ 0</text>
    <text x="160" y="296" text-anchor="middle" font-size="11" fill="#7c3aed">강제할수록 구조가 덜 무너짐</text>
  </g>

  <!-- Bottom insight -->
  <text x="400" y="380" text-anchor="middle" font-size="13" fill="#9ca3af" font-style="italic">같은 규칙, 다른 비용 구조 → 최적점이 달라진다</text>
</svg>